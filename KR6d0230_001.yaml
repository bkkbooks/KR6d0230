body:
  text: 明佛隴沙門真覺解靈峰後學智旭較大經云生生不可說乃至不生不生不可說何有三千之頌耶然亦有因緣故亦可得說如其不說何以知不可說說不可說二皆悉檀是故陳忠肅公乘一時可說之機說不可說頌此頌言簡意高理深旨備誠法門之關鍵也行者幸以此為修心之要焉萬曆甲申歲仲秋三日下筆故敘原夫三德祕藏非有非空雙非空有而題稱有者所謂祕藏不可思議也若曰般若纖塵不立則非此空若曰解脫萬法悉備則非此假若曰法身不即兩邊則非此中何者空有分張是可思議非圓三德何名祕藏故於圓有有即是空不唯即空亦乃即中故於圓空空即是中不惟即中亦乃即假故於圓中不惟雙遮而復雙照所謂舉一即三言三即一若世伊三點首羅三目不縱不橫非並非別不可思議是今祕藏也故題稱有意實在茲豈同偏教所云有哉釋此有二一開釋二合釋開釋又四一釋頌二釋門三釋有四釋三千釋頌又二一孤應釋二通別釋孤應者應謂應頌應長行而頌也如諸經中先長行後偈頌亦如此方先敘後銘之類孤謂孤起有不頌長行而自起者有無長文而自起者俱曰孤起此頌前雖無文蓋頌止觀圓初門也宜屬應頌據今單行亦孤起攝應頌孤起皆為通頌有門所以為別頌也二通別釋者頌之一字為通頌上四字為別通者通經律論故如示法華頌華嚴頌等故通別者別在此頌不通餘故如云華嚴頌非法華頌等故別以別待通無通不別以通對別無別不通通別釋題一家矩則永殊他解具如妙宗破斥云云二釋門者門隨教立教隨理生理有生滅無生無量無作之異教有藏通別圓四教之殊教既有四門豈一乎故教教各有四門門門各有一理依門入理理復隨多理本是一豈有十六開會廢竟其理自平問今之門者何教何門何理攝耶答能詮所詮既非偏小理合圓門圓門初有即無作理故頌云不以妙假有門觀誰知法界具足法又經說門多種有以教為門者即文字為門也如大品四十二字門等有以觀為門者即觀行為門也如釋論明菩薩修三三昧緣諸法實相等有以智為門者即智慧為門也如法華經云其智慧門等有以理為門者即理為門也如大品明無生法無來無去即是佛等今圓初有豈外乎是何者教故有觀觀故有智智故入理理故圓妙此頌三十六句二百五十二言非教乎因教知有知有者非智乎知有故施功為真為俗為中非觀乎三諦理顯圓妙開敷物物無拘頭頭不礙非理乎或曰教門通觀觀門通智智門通理理復何通曰止觀有此問彼答云能依是門所依何得非門雖無所通究竟遍通是妙門也故此初有亦須四門又復應知不惟圓有用此四門一十六門須教須觀須智入理但此圓有故約大釋三釋有者有即究竟有三千法是也智者大師云以有門為圓通之相又云此相四門皆妙無粗頌云不思議假非偏假假即有也非偏即圓也豈非有即圓通且妙乎或曰有門既妙三門亦妙何偏稱有曰三門平等有復何妨若有為法界攝一切法則見思之假為法界亦攝一切法生死之有即實相有亦攝一切法所謂一法趣一切法一切法趣一法也一切法趣有有即法界實相出法界實相外更無可論此即立題為有之意四釋三千者有事有理事者事造三千理者理具三千華嚴經云心如工畫師造種種五陰荊溪釋云言心造者不出二意一者約理造即是具二者約事不出三世今先明理具次明事造理具三千者不二門云心之色心也謂根塵相對一念心起此一念心具三千法三千法者謂念心若起必屬一界一界現起九界冥伏冥伏為理現起為事理事互具成十法界十法界者所謂地獄餓鬼畜生修羅人天聲聞緣覺菩薩佛也十界各各現起冥伏互具成百法界又百界各具十如是法所謂如是相如是性如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等若一界具十十界則具百百界則具千如是法矣此千如是五陰一千衆生一千此二千法屬正報國土一千屬依報依正共論故曰三千止觀云若無心而已介爾有心則三千具足法華玄義云根塵相對一念心起於十界中必屬一界即具百界千如於一念中悉皆備足此心幻師於一日夜常造種種衆生種種五陰種種國土所謂地獄假實國土乃至佛界假實國土行人當自選擇何道可從教觀二文皆談理具故引以證若欲備知須當啓彼次明事造者事造三千也荊溪云即心名變變名為造造謂體用體用者全體起用也體者三千之性性即理具用者二千之相相即事造荊溪又云並由理具方有事用今欲修觀但觀理具俱破俱立俱是法界任運攝得權實所現又四句立法云理則性德緣了事則修德三因迷則三道流轉悟則果中勝用初句即理具三千也二三四句即事造三千也又事造中初句謂順修事名字等四即是也第二句謂逆修事理即是也第三句究竟即圓滿菩提是也此初句并第三句但約圓教順修而論理而推之前三教人俱名順修故四教義俱判六即但分證究竟不同也若約收簡收則俱名為順簡則別修猶逆豈藏通人而預其順別教證道方入順流問前云收則俱名為順人天乘者為逆為順答人天在暫免三途苦邊亦名為順唯三惡道無順純逆故獨判其逆修者也有人不許三惡六即請觀修字善惡雖異其修豈殊既稱修者在因邊不無六義故妙宗鈔云三乘人天等下至蛣𧏙皆須六即判其初後若不爾者則十界不全六即不遍何名立法網法無餘但順修趣上逆修趣下自殊冠履故逆修者置之理即貶而不論若細推之理合併有況情與無情悉約十界豈三惡道獨不然哉故三千法一塵三千不少剎海三千不多縱亦三千橫亦三千三千自在無法不遍故題之曰三千有也復頌之曰不思議有事理三十立題罄矣問台宗釋題皆有五章此釋論題還例否耶答台宗釋經五章悉例釋諸論題未見懸談若以義推亦應具有且題中門者如以理為門即單法為名若以門為喻即法譬為名今能通即所通理正以單法為名也題中三千有者即是理理即法界頌云門門一一為法界故知法界為體也此法界體從三觀入若匪三觀入則無由頌云不以妙假有門觀誰知法界具足法故知三觀為宗也三千之性為能具三千之相為所具能具即體所具即用頌云若止觀心不觀具則於一觀分二家故知具字為用也又云一家觀門異諸說既異諸說不同偏小故知大乘為教相也辭義若此故知應有二合釋者又為二一會通總別二具有十乘會通總別者題目是總正文是別以總總別別無所別以別別總總無所總總無所總故總即是別別無所別故別即是總故於總中領略則於別中思過半矣問若曰總無所總總即是別用別何為答既曰別無所別別即是總不妨有別愈彰總意總有能通之門所通之理能即是所所即是能別亦例爾能通之門者問別中四門齊觀總中何獨稱有答皆不思議故圓教初門故門為能通理為所通所通之理藉能通入能通即四門也四門寬廣有門為要若入有門有門不可思議故有即三門若入三門三門不可思議故三即有門故頌曰初門即三三即一既皆不可思議何嘗定三定一故頌曰非一非三又非四所以別中四門即總中之有總中之有即別中之四別中雖四意實在有所謂圓門所謂不可思議故故頌曰是故四門之初門即是不可思議假又曰不以妙假有門觀誰知法界具足法故知一三雖異總別無差所謂所通之理者問總曰三千別曰法界法界似無三千是有總別何會答若曰法界似無便同他說非今性具須知三千一一全體皆是法界法界全體悉是三千但全性成修即三千之相全修在性即三千之性三千之相總中曰有三千之性別中曰一一即是有有即是一故頌曰豈知十界本來一三千本一亦如是又曰非但空非但中既俱非但中空有有豈同他宗法界擴然太空哉問他宗法界亦有事事無礙何同太空答彼但果上融通何關衆生本理者也故實不類問自宗他宗簡別云何答有粗有妙他宗云法界之理惟一清淨不具通惑別惑事識業識煩惱結業三乘六道變易分段迷中二法理皆不具理既不具便成別有別有之法非二佛性既非佛性豈非佛性被迷中二法之所覆也所覆之法皆由真如不守自性隨於染緣作上迷中二法法智大師立喻云如淳善人一切惡事非本所能為惡人逼令作衆惡故說善人為惡人所覆今欲歸中復用清淨真如別緣真諦及以俗中次第翻破一切迷中二法是故能宗之人所宗之教悉成粗也今家不爾以知法界具染惡性體染惡修故通別惑等一切迷法當處即是緣了佛性既皆佛性豈有佛性更覆佛性法智大師立喻云如君子不器善惡皆能或同惡人作諸惡事則彰己能何覆之有故即二迷以為緣了顯發於正是故此宗能宗所宗悉皆稱妙頌曰惟一具字顯今宗此歎所宗之妙也頌曰入此宗者甚希有此歎能宗之妙也頌曰彼迷一心具諸法此斥能宗之粗也頌曰墮在通別次第中此斥所宗之粗也自宗他宗粗妙如是所謂能即是所者問能即有門所即三千云何相即答能通之門即修也所通之理即性也所謂全修在性全性成修豈不相即所謂所即是能者問若解能即是所便悟所即是能何翻覆耶答誠如所問但前以境融觀恐有境存今乃以觀融境仍恐觀在故互融之不留朕迹又融則無二不廢兩分表不思議境觀縱橫逆順無不圓融故作是說也二具有十乘者問聞夫修有正與方便今是何修答正修問正有十乘頌還有耶答十乘理遍況此頌也略陳梗槩一觀不思議境謂觀五陰悉忘能所故不思議頌曰不思議假非偏假又曰即是不可思議假既曰假非偏假則一假具足一切諸法諸法即百界千如也此法即空即假即中廣大圓滿橫豎自在更不前後豈非不可思議境也二真正發菩提心既知前境當發大心發大心者悲自悲他上求下化也上求謂求佛果下化謂化衆生悲自向不知此方今始悟悲他一向在迷全不省覺頌云不以妙假有門觀誰知法界具足法此頌悲自也又云彼迷一心具諸法墮在通別次第中此頌悲他也既悲自及他豈不為他說此故知此頌不少菩提心矣三善巧安心止觀止即三止觀即三觀即止為觀即觀為止隨自隨他或暗或散稱機修治故曰善巧頌曰空即是心假是色非色非心名曰中此頌三觀安心也又云色心絶處中體現此頌三止安心也四破法遍法即見思塵沙無明也以三觀破三惑非前非後亦不一時故曰破遍頌曰空即是心假是色非色非心名曰中空即是心者破見思惑也假是色者破塵沙惑也非色非心者破無明惑也此三頓破故曰破遍若稍有法存則不名遍也五識通塞若根若塵若一念心與道間隔即塞也若加觀照即通也知間隔知觀照即識也頌曰聞思修證無不妙心能觀此體具故此頌通也又曰若止觀心不觀具則於一觀分二家此頌塞也若通須護有塞須破於通起塞能破如所破其斯之謂與六道品調適道品即三十七道品調適即隨宜對治也人若於此法門一一分曉一一修治雖止雖觀彌暗彌散或動或靜隨境隨流蓋未調適破惑故也今乃隨其根性一一調之何者或宜初門入法界即修初門以至破惑或宜三門入法界即修三門以至破惑若入初門即入三門若入三門即入初門故頌曰初門即三三即一是謂調適七對治助開以上道品對其根性助修開發也圓理開發則不住初門亦不住二三四門門門俱遣法界圓通故頌曰非一非三又非四八知次位次位謂五十五位也須判六即何者或有高推聖境自鄙無分或有以下劣人濫齊極果故以即而常六簡下劣人六而常即收高推者緩急得宜入薩婆若頌曰凡夫心具即佛具是為位次九能安忍安忍謂有內外三術安忍於心內三術法也外三術人也人法希有安忍於心故頌曰惟一具字顯今宗入此宗者甚希有十離法愛前之九乘或直達初住或超至等妙皆無著想若生法愛即墮信中豈能前進到薩雲地故頌曰取著不圓則不具也須知初是上根所修從二至六中根用觀自七至十下根作功雖裂三根同觀一不思議境即不思議境具下九乘九乘不離一境一境不廢九乘若不爾者即非圓門修相又非大白牛車故凡修履十乘具足不可見此上中下說便不修九妄修上根問今釋頌題用十乘為答若非十乘即同破驢車運載衆生入於惡道故此十乘經經皆有論論不無但昧者不知修墮偏倒能知具足始為上乘釋題竟宋忠肅公陳瓘述陳瓘字瑩中官諫議諡忠肅述者不敢當作公之謙辭公受法於中立法師為法智大師五世孫觀其所上師書見其諄諄於教觀矣正文四初能通門二所通理三觀即境四境即觀初中二初明初門不可思議二明四門圓融無礙初又二初明三觀圓融二結不可思議初又三初明假觀二明空觀三明中觀今初不思議假非偏假此假本具一切法不思議假者圓教初門也假即是有有何所有有三千法也此三千法即空即中故曰非偏既即空中非三非一故不思議不思議假者標也非偏假者釋也下句出非偏所以藏教以生滅觀觀一切法一一隔歷故謂偏圓教以無作觀觀一切法一一圓融故謂非一切法者空中法也此法天然非今始有故曰本具下二觀例此應云真空不空非但空此空本具一切法中觀亦爾文略意周矣所謂具法者假具空中法空具中假法中具兩邊法問假即空中何獨稱假答有易修故若入初門三門齊故二明空觀真空不空非但空但空者小乘偏空也小乘因滅苦集顯偏真理偏真不即諸法故空為但又因滅會真滅非真諦故空不真圓空具足百界千如故曰不空具有之空豈同偏小故曰非但非但空者乃畢竟空故曰真也三明中觀圓中圓滿非但中但中者別教中理如雲外月回出二邊不即空有故謂之但既不即邊中理缺闕也圓中即空即假自異偏教故謂之非既即兩邊中道圓滿也出空中者頌意恐人妄謂假為初門可也空中豈亦初乎故今以不空圓滿釋之自彰空中有假假非初門耶初門是假次門是空三門是照四門是遮今置三門且修初者不思議故初明三觀圓融竟二結不可思議是故四門之初門即是不可思議假四門者謂有門空門亦空亦有門非空非有門也初門者有門也此有雖有是不可思議何者有非偏有有即中空舉一即三言三即一是故結初云不思議初明初門不可思議竟二明四門圓融無礙初門即三三即一非一非三又非四初門謂有門三門謂空等言有門即空等二門空等三門即有一門也問即義云何答今以觀配令義可見且觀一念心有即有門即假觀觀一念心空即空門即空觀觀一念心亦有一空即雙亦門即雙照觀觀一念心非有非空即雙非門即雙遮觀初門既施三觀三門豈不施三施觀既同門豈有別故曰初門即三三即一也或曰施觀既同門何四別答天然之理故入道不同故悉檀因緣故非一非三又非四者在三望一一即是三一則非一也在一對三三即是一三則非三也三一互非四門何在門既不立觀亦靡施唯一法界卓爾獨存行者於斯盡心宜矣初能通門竟二所通理二初理具二結歎初中二初喻二法今初一二三四指一月四點似別惟一空四指者如衆翳人不識天月明眼者以指指之翳薄者一指便識稍厚者或二或三甚者須四方見四指似別月則一也故曰一二三四指一月點空喻者亦爾四指四點以喻四門一月一空以喻法界指點雖異空月不殊以喻門門不一法界理同故曰四點似別惟一空耳須知法一喻二意不徒然月喻法界之圓明空喻法界之常遍圓明常遍三世十方豎徹橫窮豈可思議指喻文出大經義不同彼彼以金錍刮目之後示之以指詢諸翳人為見不耶以至二指三指指喻諦理此指指月指喻圓門又楞嚴指月指喻言教所謂言同意別理實天殊二法門門一一為法界攝一切法皆無餘門門即四門門門不為別事一一皆為法界而設也如喻中一指二指三四指不為其諸皆為月指法界亦云法性亦云中道亦云實相一法異名耳所謂般若是一法佛說種種名攝一切法皆無餘者一切法即三千法攝者不獨有門攝一切法三門皆攝一切法皆者三門也無餘者不約三千攝則不盡今約一念具收諸法故曰無餘問四門攝相云何答一念心起三千性相一時起則有門法界攝一切法無餘也一念心滅三千性相一時滅則空門法界攝一切法無餘也一念心亦起亦滅三千性相一時亦起亦滅則雙亦門法界攝一切法無餘也一念心非起非滅三千性相一時非起非滅則雙非門法界攝一切法無餘也若識一念攝法如此則根根塵塵攝法亦如此蓋此一念為修行之要故約此說若廣說者無法不攝也問具攝何別答約理曰具約事曰攝具如水具波性攝如波還即水問若爾水即體也波即用也波還即水即攝用歸體豈同理具耶答荊溪云並由理具方有事用須知事用全體是理何一用而非法界也既皆法界用用皆體故攝即具具還是攝下文云誰知法界具足法即結歎此文故知法界攝法即是法界具法也若爾何不言具而言攝耶曰表圓詮故理自爾故初理具竟二結歎不以妙假有門觀誰知法界具足法假即是有有即是假假非偏假故曰妙假法界即有門法界也法者三千法也法界為能具三千為所具雖離四句能所且分故曰法界具足法又所具三千各各互具皆名法界俱曰三千此理天然情無情具昧者不覺故曰誰知因修妙觀洞達法界具足諸法故曰不以等二所通理竟三觀即境觀者即前所謂能通門之觀也境者即前所謂所通理之理也即者能所互融之謂何者以由三德祕藏為理為門為觀故也前之門觀與理自不相礙今之所以復即者恐有未悟猶存能所故今即之泯前門理門理既泯獨一法性圓明自若也然此先以觀即境文二初明修證妙二明修證粗今初聞思修證無不妙心能觀此體具故聞思修者能修之慧即三慧也證者所證之位即地位也體者所觀之境即三諦也觀者能觀之觀即三觀也全由三德祕藏之理為諦為觀為慧為位既皆三德一一圓融故聞思修證無一不妙聞無不妙者聞即名字即初隨喜品觀師云隨喜何法所謂妙法妙法者即是心也妙心體具如如意珠此心即空即假即中普賢云心聞洞十方心既能聞聞即圓聽故無不妙既曰隨喜意必兼師若無師者聞從誰得感應道交師有宣道其如不言弟子何知不知屬理知屬名字又此聞慧理合位位皆有如解脫月請金剛藏說十地等又讀誦等四理合各說聞慧語寬隨喜文收思無不妙者思三千法即空假中若中下之流聞而不思上根之者必加思究能思所思即心具故思惟路絶心雖無緣三千實相炳然齊現故無不妙修無不妙者以三觀慧觀心具法即空假中即空故伏見思惑即假故伏塵沙惑即中故伏無明惑五住頓伏觀行位成見思若斷相似位證分斷無明分真位得無明斷盡究竟成佛觀雖屬修修全在性全性起修修還照性修性不二故無不妙證無不妙者如大品云四十二字門阿字即具四十一字功德字字之中具具皆爾故今圓位亦復如之所謂一證一切證一切證一證位若非性何能位位相收自在若此以其相收自在故無不妙或曰大品止云四十二字以況四十二位所謂十住十行十回向十地等妙豈二凡亦圓具耶曰若十信不具何六根淨見大千界若五品不具何初隨喜便稱妙法故知位位皆具方曰圓乘若前後有異便同別教心能下答也或有問曰何故聞思修證皆稱為妙即以此句答之二明修證粗三初出非二揀濫三斥迷今初若止觀心不觀具則於一觀分二家他宗但觀心性清淨不觀心具諸法心不具法則心外有法明矣心外有法法不具心明矣法不具心心不具法故於一心分心分法豈非一觀而分二家二揀濫一家觀門異諸說諸說雖異觀自一大經云正因佛性了因佛性緣因佛性一家所談一曰性體即正因佛性也二曰性量即了因佛性也三曰性具即緣因佛性也具即是假假即空中秪一法相有茲三義所謂會之彌分派之常合雖一一遍亦無所在不同他宗秪談真如隨緣作差別法差別謂九法界也不隨緣時則無差別無差別謂真如一性也今家則不然三千之體隨緣起三千之用不隨緣時三千宛然故差別法與體不二是故一家觀門異諸說也諸說雖異法常法爾法豈被談而隨乎談異也故觀自一三斥迷又二初斥迷墮二出所以今初彼迷一心具諸法墮在通別次第中他宗不知心具法故墮通墮別墮通者惟知體一切法空空不即假故墮通也墮別者從假入空從空入假從空入中中不即邊故墮別也二出所以次第而生次第斷豈知十界本來一三千本一亦如是皆非世數可分別他宗謂真如不守自性隨染淨緣造十法界故曰次第生夫欲成佛須壞九界以次第觀翻破三惑方成佛果故曰次第斷今家不然以三惑全體是性惡法門故不須斷又九法界亦全體是性德故不須壞彼不知此烏知十界本來是一此宗灼然洞照千如故用即體三千相是世數故可分別三千性非世數故不可分別故云爾耳三觀即境竟四境即觀三初明具體二明具人三明具宗初中三初境觀二指示三功能今初妙境元無空假中而亦不離空假中境即三諦也觀即境故故曰元無境即觀故故曰不離境觀不二故稱為妙有人掃蕩一切不立即此上句也無此下句不墮偏倒與二指示空即是心假是色非色非心名曰中心指一念心也一念無相並畢竟空故空色指三千色也無法不備並如來藏故假中指色心不一不異並是法界故中此空假中語似分張並皆相即三功能色心絶處中體現於一一法體皆具色心絶是雙遮一一具是雙照雙遮故中體獨露雙照故法相並彰二明具人凡夫心具即佛具取著不圓則不具一一法具豈獨聖人凡夫秪是佛心中十界之一佛亦秪是凡夫心中十界之一論其修證則有分滿論其心具則無差別故凡夫心具即是佛具但不可取著取著兩邊及中即非圓教烏得而具何則前三教諦分裂偏小故不具法若後圓教無法不備偏圓修證不可同年而語也三明具宗惟一具字顯今宗入此宗者甚希有上句讚法下句讚人古師云只一具字彌顯今宗故曰惟一具字顯今宗也當知他宗惟談法性法性之談是今性體性量彼闕性具是故今宗超勝於彼入此宗者名為頓人圓頓之人言行直截法輪轉處誰嬰其鋒如師子吼誰不腦裂故歎此人甚希有也瓘公宋人也作有門頌垂五百年矣太史開之馮公諄諄於是命余為之解二公用心不殊且五百年將非再來者與是月六日閣筆故敘附瑩中居士與明智法師書瓘頓首再拜上啓南湖延慶堂上講主明智大師人回伏奉書教獲審道體安隱無惱下懷良慰向承寄示觀音玄義并記且荷開發妙旨以袪愚蔽深佩提獎之意感德無已有門頌但隨順古意過蒙采覽仰見法師收簡自在來諭云以有題之恐鈍者不領誠如所慮然智者以有門為圓門之相又謂此相四門皆妙無粗若有門為法界攝一切法況復三門法相平等無復優劣是故若論具足佛法則見思假即法界也若論法性因緣則第一義亦因緣也故此妙門以有召之即生死之有是實相之有一切法趣有有即法界出法界外更無可論此即止觀有門之大旨而前書妙假之意也有未領者亦當以妙假之義開曉之耳智者解大經之語云因滅無明則得熾然三菩提燈即有門也有門即是妙假妙假即是有門其或未領則於此有門不能無惑然而前病後藥無兩有也病去惑亡則有門豁矣一指二指三指不待更說然則有之一門純妙無粗具足萬善豈非三千之性乎所云此之三千性是中理不當有無有無自爾茲乃古師詮具之微言也自非深領其旨未易解此夫三千也者世間之數也若三千性則離世間矣離而復即即而復離不一不異非有非無三千而一一而三千此不可思議數即是不可思議境若觀若智俱不思議此數即是止觀故三千性即中理此境即是此數故中理即三千性若但三千則是一切一切法耳一切法但有名字何能具乎若一切法性則本具矣故三千即是一切法一切法性即是三千性也此性不當有無有無自爾夫不當有無者泯妙外之一執也有無自爾者開離執之一妙也於有為妙有於無為真無真無則空而不空妙有則有而不有有無自爾非有無也在假則假具在空別空具在中則中具無不在無不具也然則妙假之有豈情有乎假不待空泯絶無對說有說無皆不待絶今乃設有待之言讚歎妙假之說豈免為巧度之所訶乎且一念心起則有三千世間之相國土一千則山河大地是也五陰世間一千則染淨一切色心是也衆生世間一千則六凡四聖假名是也一念心起三千性相一時起一念心滅三千性相一時滅念外無一毫法可得法外無一毫念可得此乃本住不遷不遷者中理圓明之體此體如理為念其壽無量非得命根亦無連持本無名字而不失諸名名其國曰極樂國名其身曰阿彌陀身土交參融乎一妙故能使說法之音不離彼土而廣長舌相具足周遍其具如是是體具乎是性具乎是佛具乎是衆生具乎若有能知具彼之樂者其有不願往生者乎向實際之中要在不往而往於方便之內何妨去已還來機熟緣深定須成辦此瓘之有得於祖意者也瓘屏迹丹丘老病待盡千里相望淨願不隔更祈慈蔭以師法見攝而終教之未由會面以究盡此旨風臨但極瞻嚮之切瓘頓首再拜上啓鑰舊讀了翁集見有門頌一篇莫知其旨有二沙門來扣門袖出有門頌真績及與明智講主論此頌二帖讀之恍然因問天台教觀之說始知智者大師所說四門一曰有門一曰空門一曰亦空亦有門一曰非空非有門其實一可貫四四實歸一公之為有門頌蓋謂此也近世士大夫用力不及前輩秪如學佛僅能涉獵楞嚴圓覺淨名等經及傳燈語録以資談辨若唐之梁補闕諸公本朝楊文公楊無為張無盡及了翁輩皆留心教觀深入其趣讀此頌及書可以知其所造之實惟公忠言大節照映千載身罹百謫視生死如旦晝平時學問自得之效固自應爾方在丹丘時逆境尤多而心地泰然深入不二法門公之學佛得力豈易測哉二沙門欲刊石以傳之人謹書諸後以歸之妙珣了怡二沙門之名云慶元二年中秋四明樓鑰題士大夫當患難則學佛得志則有用夏變夷之說蓋於佛無所得也了翁有門頌其於佛有所得歟攻愧其知之者歟景定二年正月二十八日天台法照為四明學子可登題於月桂峯下又附馮太史請解有門頌書武林一別聞問杳然不審比日道體何似震旦國中天台種子惟師一人不可不自愛倘藥餌之暇望一思有門頌注惠教為感即日秋序涼風動幃浮生過客閃眼無常我輩幸受法熏倘一蹉過與庸人何異願師珍重作我輩津梁尊恙良已更祈振錫以慰渴想風便馳此不多七月一日弟子夢禎和南又附有門頌略解序宋時天台之教盛行無論僧徒即號為士大夫者類能言之今觀陳瑩中先生所撰有門頌抑何言約義辦也今相去僅四五百年而海內緇流無能舉天台一字一義者況士大夫乎妙峰覺法師奮然為鳴陽孤鳳幾二十年講者或竊笑斥為異物而法師益精其說不為動今則稍習矣海內賢士大夫或有起而助法師者矣惜余非其人也因請法師出有門頌略解行於世以聳動今之士大夫台教中興在此一舉余日望之萬曆甲申長至日翰林院編修教觀弟子馮夢禎謹撰刻三千有門頌解後序北齊大師得龍樹中論之道一傳于南嶽再傳于智者而後教觀始著權實理明解行俱妙真可謂傳佛心印冠羣宗者矣唐有荊溪宋有四明咸稱中興教主故使居士宰官同服甘露梁肅陳瓘皆其人也元明以來此道不振或有教無觀如貧數寶或有觀無教以凡濫聖神廟初年妙峰老人起而唱之一齊衆楚傅不勝咻開之馮居士乃力請解有門頌以為士君子風妙師辭達理瑩遂使緇素翕然向化于今又六十年古板不可復覩豫念重闢草萊實賴妙師開之二大士力故復較梓以報法恩并附瑩中上明智書庶可互相發明讀者苟知介爾有心即是不思議有即是妙假即是圓教初門即是法界具足三千諸法無缺無餘豈非直指人心見性成佛豈非不思議境圓具九法成一大乘不生退屈不生上慢者耶噫苟不讀此安知三大五小之妙苟不精熟三大五小亦安知此頌此解之妙也哉古吳後學智旭拜識
